<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="app" class="container"></div>
    <script type="text/babel">
      const app = document.getElementById("app");

      function Header({ title }) {
        return <h1>{createTitle(title)}</h1>;
      }
      function Paragraph(props) {
        return <p>{props.text}</p>;
      }
      function createTitle(title) {
        if (title) {
          return title;
        } else {
          return "Default title";
        }
      }
      function formatHtml(text) {
        return text;
      }

      function Results({ result, currentPage, lastPage, totalResults, onNext, onPrev }) {
        return (
          <div>
            {result.length > 0 && (
              <>
                <h2>Search Results:</h2>
                {/* Task 2: Display pagination info */}
                <Paragraph text={`Showing page ${currentPage} of ${lastPage}`} />
                <Paragraph text={`Total Results: ${totalResults}`} />
              </>
            )}

            <table className="table table-striped">
              <tbody>
                {result.map((res, index) => (
                  <tr key={res.uid}>
                    <td>
                      <strong>{res.alpha}</strong> <br />
                      {formatHtml(res.context)} <br />
                      <a href={res.url} target="_blank">
                        View
                      </a>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>

            {result.length > 0 && (
              <div className="d-flex gap-2">
                {/* Task 6: Previous button */}
                <button
                  className="btn btn-secondary"
                  onClick={onPrev}
                  disabled={currentPage === 1}
                >
                  Previous Page
                </button>

                {/* Task 4 & 5: Next button, disabled on last page */}
                <button
                  className="btn btn-secondary"
                  onClick={onNext}
                  disabled={currentPage === lastPage}
                >
                  Next Page
                </button>
              </div>
            )}
          </div>
        );
      }

      function Homepage() {
        const [searchTerm, setSearchTerm] = React.useState("");
        const [searchResults, setSearchResults] = React.useState([]);

        // Task 1: Store pagination data
        const [currentPage, setCurrentPage] = React.useState(1);
        const [lastPage, setLastPage] = React.useState(1);
        const [totalResults, setTotalResults] = React.useState(0);

        // Task 3: performSearch accepts a page parameter
        function performSearch(page = 1) {
          const searchUrl = `https://www.cdn.miami.edu/_assets-common/php/searchblox/?q=${searchTerm}&page=${page}`;
          fetch(searchUrl)
            .then((response) => response.json())
            .then((data) => {
              console.log("Search results: ", data);
              setSearchResults(data.result);
              // Task 1: Save pagination state
              setTotalResults(data.hits);
              setCurrentPage(data.currentPage);
              setLastPage(data.lastPage);
            })
            .catch((error) => {
              console.error("Error performing search: ", error);
            });
        }

        // Task 3: Reset to page 1 on new search
        function handleSearch() {
          setCurrentPage(1);
          performSearch(1);
        }

        // Task 4: Next page
        function getNextPage() {
          const nextPage = currentPage + 1;
          setCurrentPage(nextPage);
          performSearch(nextPage);
        }

        // Task 6: Previous page
        function getPrevPage() {
          const prevPage = currentPage - 1;
          setCurrentPage(prevPage);
          performSearch(prevPage);
        }

        return (
          <>
            <Header title="Welcome to the search page" />
            <Paragraph text="Enter a search term below." />
            <div className="mb-3">
              <label className="form-label" htmlFor="search">
                Search:
              </label>
              <input
                className="form-control"
                type="text"
                id="search"
                name="search"
                placeholder="Search miami.edu..."
                value={searchTerm}
                onChange={(e) => setSearchTerm(e.target.value)}
              />
            </div>
            <button className="btn btn-primary" onClick={handleSearch}>
              Search
            </button>
            <Results
              result={searchResults}
              currentPage={currentPage}
              lastPage={lastPage}
              totalResults={totalResults}
              onNext={getNextPage}
              onPrev={getPrevPage}
            />
          </>
        );
      }

      const root = ReactDOM.createRoot(app);
      root.render(<Homepage />);
    </script>
  </body>
</html>
