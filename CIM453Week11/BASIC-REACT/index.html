<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UM Search</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <style>
      body {
        background-color: #f5f0e8;
        font-family: 'Georgia', serif;
      }
      #app {
        max-width: 800px;
        margin: 0 auto;
        padding: 40px 20px;
      }
      h1 {
        color: #005030;
        font-size: 2.5rem;
        font-weight: bold;
        border-bottom: 3px solid #f07000;
        padding-bottom: 10px;
        margin-bottom: 20px;
      }
      h2 {
        color: #f07000;
        font-size: 1.5rem;
        margin-top: 20px;
      }
      p {
        color: #005030;
        font-size: 0.95rem;
      }
      .form-label {
        color: #005030;
        font-weight: bold;
      }
      .form-control {
        border: 2px solid #005030;
        border-radius: 8px;
        background-color: #fdf8f0;
      }
      .form-control:focus {
        border-color: #f07000;
        box-shadow: 0 0 0 0.2rem rgba(240, 112, 0, 0.25);
      }
      .btn-search {
        background-color: #005030;
        color: #f5f0e8;
        border: none;
        border-radius: 8px;
        padding: 8px 24px;
        font-weight: bold;
        margin-top: 8px;
        transition: background-color 0.2s;
      }
      .btn-search:hover {
        background-color: #f07000;
        color: #f5f0e8;
      }
      .btn-nav {
        background-color: #f5f0e8;
        color: #005030;
        border: 2px solid #005030;
        border-radius: 8px;
        padding: 6px 20px;
        font-weight: bold;
        transition: all 0.2s;
      }
      .btn-nav:hover:not(:disabled) {
        background-color: #005030;
        color: #f5f0e8;
      }
      .btn-nav:disabled {
        opacity: 0.4;
        cursor: not-allowed;
      }
      .table {
        background-color: #fdf8f0;
        border-radius: 10px;
        overflow: hidden;
        margin-top: 16px;
        box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      }
      .table tbody tr:hover {
        background-color: #fce8d0;
      }
      .table td {
        padding: 14px 18px;
        color: #333;
        border-bottom: 1px solid #e8dfc8;
      }
      .table td strong {
        color: #005030;
        font-size: 1.05rem;
      }
      .table td a {
        color: #f07000;
        font-weight: bold;
        text-decoration: none;
      }
      .table td a:hover {
        text-decoration: underline;
      }
      .pagination-info {
        background-color: #e8f5e0;
        border-left: 4px solid #005030;
        padding: 10px 16px;
        border-radius: 6px;
        margin-bottom: 10px;
      }
    </style>
  </head>
  <body>
    <div id="app" class="container"></div>
    <script type="text/babel">
      const app = document.getElementById("app");

      function Header({ title }) {
        return <h1>{createTitle(title)}</h1>;
      }
      function Paragraph(props) {
        return <p>{props.text}</p>;
      }
      function createTitle(title) {
        if (title) {
          return title;
        } else {
          return "Default title";
        }
      }
      function formatHtml(text) {
        return text;
      }

      function Results({ result, currentPage, lastPage, totalResults, onNext, onPrev }) {
        return (
          <div>
            {result.length > 0 && (
              <>
                <h2>Search Results</h2>
                <div className="pagination-info">
                  <p className="mb-0">Showing page {currentPage} of {lastPage}</p>
                  <p className="mb-0">Total Results: {totalResults}</p>
                </div>
              </>
            )}

            <table className="table">
              <tbody>
                {result.map((res, index) => (
                  <tr key={res.uid}>
                    <td>
                      <strong>{res.alpha}</strong> <br />
                      {formatHtml(res.context)} <br />
                      <a href={res.url} target="_blank">View →</a>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>

            {result.length > 0 && (
              <div className="d-flex gap-2 mt-2">
                <button
                  className="btn-nav"
                  onClick={onPrev}
                  disabled={currentPage === 1}
                >
                  ← Previous
                </button>
                <button
                  className="btn-nav"
                  onClick={onNext}
                  disabled={currentPage === lastPage}
                >
                  Next →
                </button>
              </div>
            )}
          </div>
        );
      }

      function Homepage() {
        const [searchTerm, setSearchTerm] = React.useState("");
        const [searchResults, setSearchResults] = React.useState([]);
        const [currentPage, setCurrentPage] = React.useState(1);
        const [lastPage, setLastPage] = React.useState(1);
        const [totalResults, setTotalResults] = React.useState(0);

        function performSearch(page = 1) {
          const searchUrl = `https://www.cdn.miami.edu/_assets-common/php/searchblox/?q=${searchTerm}&page=${page}`;
          fetch(searchUrl)
            .then((response) => response.json())
            .then((data) => {
              console.log("Search results: ", data);
              setSearchResults(data.result);
              setTotalResults(data.hits);
              setCurrentPage(data.currentPage);
              setLastPage(data.lastPage);
            })
            .catch((error) => {
              console.error("Error performing search: ", error);
            });
        }

        function handleSearch() {
          setCurrentPage(1);
          performSearch(1);
        }

        function getNextPage() {
          const nextPage = currentPage + 1;
          setCurrentPage(nextPage);
          performSearch(nextPage);
        }

        function getPrevPage() {
          const prevPage = currentPage - 1;
          setCurrentPage(prevPage);
          performSearch(prevPage);
        }

        return (
          <>
            <Header title="🌴 Welcome to the search page " />
            <Paragraph text="Enter a search term to explore miami.edu." />
            <div className="mb-3">
              <label className="form-label" htmlFor="search">
                Search:
              </label>
              <input
                className="form-control"
                type="text"
                id="search"
                name="search"
                placeholder="Search miami.edu..."
                value={searchTerm}
                onChange={(e) => setSearchTerm(e.target.value)}
              />
            </div>
            <button className="btn-search" onClick={handleSearch}>
              Search
            </button>
            <Results
              result={searchResults}
              currentPage={currentPage}
              lastPage={lastPage}
              totalResults={totalResults}
              onNext={getNextPage}
              onPrev={getPrevPage}
            />
          </>
        );
      }

      const root = ReactDOM.createRoot(app);
      root.render(<Homepage />);
    </script>
  </body>
</html>
